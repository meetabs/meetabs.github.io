    <div class="post-body" itemprop="articleBody">
          <p>使用xilinx的petalinux构建BOOT.BIN和image.ub需要输入多条指令, 每次都这样输入的话真的会累死人, 所以想到把指令写成脚本, 一劳永逸。</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line"># /etc/zcu102</span><br><span class="line"></span><br><span class="line"># fpga 导出的hdf和bit文件的存放目录</span><br><span class="line">hdf_file_dir=/samba/fpga_hdf_and_bit</span><br><span class="line"># petalinux的安装目录</span><br><span class="line">petalinux_install_dir=/opt/petalinux-2017.4</span><br><span class="line"># 板级支持包</span><br><span class="line">board_support_package=&quot;/opt/board_support_package/xilinx-zcu102-v2017.4-final.bsp&quot;</span><br><span class="line"># 开发板所属系列</span><br><span class="line">template_type=&quot;zynqMP&quot;</span><br><span class="line">        </span><br></pre></td></tr></table></figure>

<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br><span class="line">112</span><br><span class="line">113</span><br><span class="line">114</span><br><span class="line">115</span><br><span class="line">116</span><br><span class="line">117</span><br><span class="line">118</span><br><span class="line">119</span><br><span class="line">120</span><br><span class="line">121</span><br><span class="line">122</span><br><span class="line">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br><span class="line">142</span><br><span class="line">143</span><br><span class="line">144</span><br><span class="line">145</span><br><span class="line">146</span><br><span class="line">147</span><br><span class="line">148</span><br><span class="line">149</span><br><span class="line">150</span><br><span class="line">151</span><br><span class="line">152</span><br><span class="line">153</span><br><span class="line">154</span><br><span class="line">155</span><br><span class="line">156</span><br><span class="line">157</span><br><span class="line">158</span><br><span class="line">159</span><br><span class="line">160</span><br><span class="line">161</span><br><span class="line">162</span><br><span class="line">163</span><br><span class="line">164</span><br><span class="line">165</span><br><span class="line">166</span><br><span class="line">167</span><br><span class="line">168</span><br><span class="line">169</span><br><span class="line">170</span><br><span class="line">171</span><br><span class="line">172</span><br><span class="line">173</span><br><span class="line">174</span><br><span class="line">175</span><br><span class="line">176</span><br><span class="line">177</span><br><span class="line">178</span><br><span class="line">179</span><br><span class="line">180</span><br><span class="line">181</span><br><span class="line">182</span><br><span class="line">183</span><br><span class="line">184</span><br><span class="line">185</span><br><span class="line">186</span><br><span class="line">187</span><br><span class="line">188</span><br><span class="line">189</span><br><span class="line">190</span><br><span class="line">191</span><br><span class="line">192</span><br><span class="line">193</span><br><span class="line">194</span><br><span class="line">195</span><br><span class="line">196</span><br><span class="line">197</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">#!/bin/bash</span><br><span class="line">#</span><br><span class="line"># Auto build linux image for zcu102/zcu104 board</span><br><span class="line">#</span><br><span class="line"></span><br><span class="line">board_name=&quot;zcu102&quot;</span><br><span class="line">conf_file=&quot;/etc/$&#123;board_name&#125;&quot;</span><br><span class="line"></span><br><span class="line">if [ ! -f $conf_file ];then</span><br><span class="line">	echo &quot;$conf_file file does not exist&quot;</span><br><span class="line">	exit</span><br><span class="line">fi</span><br><span class="line">source $conf_file</span><br><span class="line"></span><br><span class="line">fpga_bitstream_config=&quot;&quot;</span><br><span class="line">project_workspace=~/petalinux_workspace</span><br><span class="line">current_time=&quot;`date +%m%d%H%M%S`&quot;</span><br><span class="line">self_pid=$$</span><br><span class="line">project_name=&quot;petalinux_project_$&#123;current_time&#125;_$&#123;self_pid&#125;_$&#123;board_name&#125;&quot;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">error_log()</span><br><span class="line">&#123;</span><br><span class="line">    echo -e &quot;\033[31m\033[01m[ERROR]: $1 \033[0m&quot;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">warning_log()</span><br><span class="line">&#123;</span><br><span class="line">    echo -e &quot;\033[33m\033[01m\033[05m[INFO]: $1 \033[0m&quot;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">set_petalinux_env()</span><br><span class="line">&#123;</span><br><span class="line">	if [ ! -d $petalinux_install_dir ];then</span><br><span class="line">		echo &quot;$petalinux_install_dir directory does not exist&quot;</span><br><span class="line">		exit</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	if [ ! -f $petalinux_install_dir/settings.sh -a ! -f $petalinux_install_dir/settings.csh ];then</span><br><span class="line">		echo &quot;petalinux install directory config error&quot;</span><br><span class="line">		exit</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	bash_num=`echo $SHELL | grep &quot;bash&quot; | wc -l`</span><br><span class="line">	csh_num=`echo $SHELL | grep &quot;csh&quot; | wc -l`</span><br><span class="line">	if [ $bash_num -eq 0 -a $csh_num -eq 0 ];then</span><br><span class="line">		echo &quot;please ensure your shell type is bash or csh&quot;</span><br><span class="line">		exit</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	echo &quot;shell type: $SHELL&quot;</span><br><span class="line">	if [ $bash_num -eq 1 ];then</span><br><span class="line">		source $petalinux_install_dir/settings.sh</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	if [ $csh_num -eq 1 ];then</span><br><span class="line">		source $petalinux_install_dir/settings.csh</span><br><span class="line">	fi</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">create_project()</span><br><span class="line">&#123;</span><br><span class="line">	if [ -d $project_name ];then</span><br><span class="line">		rm -rf $project_name</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	if [ ! -d $project_workspace ];then</span><br><span class="line">		mkdir -p $project_workspace</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	if [ ! -f $board_support_package ];then</span><br><span class="line">		echo &quot;$board_support_package file does not exist&quot;</span><br><span class="line">		exit</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	cd $project_workspace</span><br><span class="line">	petalinux-create --type project --template $template_type --name $project_name  --source $board_support_package</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">change_dir_to_project()</span><br><span class="line">&#123;</span><br><span class="line">	cd $project_workspace/$project_name</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">config_hdf_file()</span><br><span class="line">&#123;</span><br><span class="line">	if [ ! -d $hdf_file_dir ];then</span><br><span class="line">		echo &quot;$hdf_file_dir directory does not exist&quot;</span><br><span class="line">		exit</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	change_dir_to_project</span><br><span class="line">	inner_hdf_and_bit_dir=&quot;$project_workspace/$project_name/hdf_and_bit&quot;</span><br><span class="line">	cp -rf $hdf_file_dir $inner_hdf_and_bit_dir</span><br><span class="line">	if [ $? -ne 0 ]; then</span><br><span class="line">		error_log &quot;copy the .hdf and .bit failed&quot;</span><br><span class="line">		exit</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	hw_description_config=&quot;--get-hw-description=$inner_hdf_and_bit_dir&quot;</span><br><span class="line">	</span><br><span class="line">	find_bit_file_cmd=&quot;find $inner_hdf_and_bit_dir -maxdepth 1 -name &quot;*.bit&quot; &quot;</span><br><span class="line">	find_hdf_file_cmd=&quot;find $inner_hdf_and_bit_dir -maxdepth 1 -name &quot;*.hdf&quot; &quot;</span><br><span class="line">	bit_file_number=`$find_bit_file_cmd | wc -l`</span><br><span class="line">	hdf_file_number=`$find_hdf_file_cmd | wc -l`</span><br><span class="line">	if [ $bit_file_number -eq 0 -a $hdf_file_number -eq 0 ];then</span><br><span class="line">		warning_log &quot;script will not load the hw-description&quot;</span><br><span class="line">		hw_description_config=&quot;&quot;</span><br><span class="line">		fpga_bitstream_config=&quot;&quot;</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	if [ $bit_file_number -gt 1 -o $hdf_file_number -gt 1 ];then</span><br><span class="line">		error_log &quot;there are multiple .bit/.hdf files&quot;</span><br><span class="line">		exit</span><br><span class="line">	fi</span><br><span class="line">	</span><br><span class="line">	bit_file=`$find_bit_file_cmd`</span><br><span class="line">	if [ -f $bit_file ];then</span><br><span class="line">		fpga_bitstream_config=&quot;--fpga $bit_file&quot;</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	petalinux-config $hw_description_config</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">clean_exist_bootloader()</span><br><span class="line">&#123;</span><br><span class="line">	petalinux-build -c bootloader -x distclean</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">config_kernel()</span><br><span class="line">&#123;</span><br><span class="line">	petalinux-config -c kernel	</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">config_rootfs()</span><br><span class="line">&#123;</span><br><span class="line">	petalinux-config -c rootfs	</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">patch_bug_for_zcu104()</span><br><span class="line">&#123;</span><br><span class="line">	petalinuxbsp_config_file=&quot;$project_workspace/$project_name/project-spec/meta-user/conf/petalinuxbsp.conf&quot;</span><br><span class="line">	echo &#x27;IMAGE_INSTALL_remove = &quot;gstreamer-vcu-examples&quot;&#x27;  &gt;&gt;	$petalinuxbsp_config_file</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">build_project()</span><br><span class="line">&#123;</span><br><span class="line">	petalinux-build</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">package_project()</span><br><span class="line">&#123;</span><br><span class="line">	petalinux-package --boot --fsbl images/linux/zynqmp_fsbl.elf  --pmufw images/linux/pmufw.elf  --u-boot images/linux/u-boot.elf	$fpga_bitstream_config</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">main()</span><br><span class="line">&#123;</span><br><span class="line">	set_petalinux_env</span><br><span class="line"></span><br><span class="line">	create_project</span><br><span class="line"></span><br><span class="line">	change_dir_to_project</span><br><span class="line"></span><br><span class="line">	config_hdf_file</span><br><span class="line"></span><br><span class="line">	# for zcu104 bug, before config_kernel</span><br><span class="line">	if [ x&quot;$board_name&quot; == x&quot;zcu104&quot; ];then</span><br><span class="line">		patch_bug_for_zcu104</span><br><span class="line">	fi</span><br><span class="line"></span><br><span class="line">	clean_exist_bootloader</span><br><span class="line"></span><br><span class="line">	config_kernel</span><br><span class="line"></span><br><span class="line">	config_rootfs</span><br><span class="line"></span><br><span class="line">	build_project</span><br><span class="line"></span><br><span class="line">	package_project</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">main</span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
