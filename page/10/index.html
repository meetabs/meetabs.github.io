          <a href="/2019/01/04/cpp_singleton_program/" class="post-title-link" itemprop="url">C++编写单实例运行的程序 </a>
        </h2>

        <div class="post-meta-container">
          <div class="post-meta">

    <div class="post-body" itemprop="articleBody">
          <p>有些程序要求只运行一个实例, 实现单实例的方法也有多种, 之前我一般是通过锁住一个pid文件实现单实例运行, 最近在网上看到绑定套接字的方法实现单实例运行，这种方法在程序退出时候能够自动释放套接字, 实现了自我清理的过程, 很是优雅。</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br></pre></td><td class="code"><pre><span class="line">//singleton.h</span><br><span class="line"></span><br><span class="line">#include &lt;iostream&gt;</span><br><span class="line">#include &lt;string&gt;</span><br><span class="line"></span><br><span class="line">class Singleton</span><br><span class="line">&#123;</span><br><span class="line">public:</span><br><span class="line">    Singleton(uint16_t port) : socket_fd_(-1), rc_(1), port_(port)</span><br><span class="line">    &#123;&#125;</span><br><span class="line"></span><br><span class="line">    ~Singleton();</span><br><span class="line"></span><br><span class="line">    bool operator()();</span><br><span class="line"></span><br><span class="line">private:</span><br><span class="line">    int socket_fd_ = -1;</span><br><span class="line">    int rc_;</span><br><span class="line">    uint16_t port_;</span><br><span class="line">&#125;;</span><br><span class="line">        </span><br></pre></td></tr></table></figure>

<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br></pre></td><td class="code"><pre><span class="line">//singleton.cpp</span><br><span class="line"></span><br><span class="line">#include &lt;unistd.h&gt;</span><br><span class="line">#include &lt;string.h&gt;</span><br><span class="line">#include &lt;netinet/in.h&gt;</span><br><span class="line">#include &quot;singleton.h&quot;</span><br><span class="line"></span><br><span class="line">Singleton::~Singleton()</span><br><span class="line">&#123;</span><br><span class="line">    if (socket_fd_ != -1)</span><br><span class="line">    &#123;</span><br><span class="line">        close(socket_fd_);</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">bool Singleton::operator()()</span><br><span class="line">&#123;</span><br><span class="line">    if (socket_fd_ == -1 || rc_)</span><br><span class="line">    &#123;</span><br><span class="line">        socket_fd_ = -1;</span><br><span class="line">        rc_ = 1;</span><br><span class="line"></span><br><span class="line">        if ((socket_fd_ = socket(AF_INET, SOCK_DGRAM, 0)) &lt; 0)</span><br><span class="line">        &#123;</span><br><span class="line">            throw std::runtime_error(std::string(&quot;could not create socket: &quot;) + strerror(errno));</span><br><span class="line">        &#125; else</span><br><span class="line">        &#123;</span><br><span class="line">            struct sockaddr_in name;</span><br><span class="line">            name.sin_family = AF_INET;</span><br><span class="line">            name.sin_port = htons(port_);</span><br><span class="line">            name.sin_addr.s_addr = htonl(INADDR_ANY);</span><br><span class="line">            rc_ = bind(socket_fd_, (struct sockaddr *) &amp;name, sizeof(name));</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    return (socket_fd_ != -1 &amp;&amp; rc_ == 0);</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>


<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br></pre></td><td class="code"><pre><span class="line">//main.cpp</span><br><span class="line"></span><br><span class="line">#include &lt;iostream&gt;</span><br><span class="line">#include &quot;singleton.h&quot;</span><br><span class="line"></span><br><span class="line">int main(int argc, char *argv[])</span><br><span class="line">&#123;</span><br><span class="line">    const int port = 5678;</span><br><span class="line">    Singleton single(port);</span><br><span class="line"></span><br><span class="line">    if (!single())</span><br><span class="line">    &#123;</span><br><span class="line">        std::cerr &lt;&lt; &quot;program already running.&quot; &lt;&lt; std::endl;</span><br><span class="line">        exit(-1);</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    while (true)</span><br><span class="line">    &#123;</span><br><span class="line">        // keep program do not return</span><br><span class="line">        ;</span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    return 0;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
